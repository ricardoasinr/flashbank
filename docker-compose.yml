services:

  # ---------------------------------------------------------------------------
  # PostgreSQL - Transactions Service (CQRS Write Side)
  # Postgres 18+ (imagen :latest): el volumen debe montarse en /var/lib/postgresql
  # (no en .../data). Ver docker-library/postgres#1259.
  # Si venías de un volumen antiguo montado en .../data, bórralo y recrea:
  #   docker compose down && docker volume rm flashbank-pg-transactions-data flashbank-pg-accounts-data
  # ---------------------------------------------------------------------------
  postgres-transactions:
    image: postgres:latest
    container_name: postgres-transactions
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_TX_DB}
      POSTGRES_USER: ${POSTGRES_TX_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TX_PASSWORD}
    volumes:
      - pg-transactions-data:/var/lib/postgresql
      - ./init/init-transactions.sql:/docker-entrypoint-initdb.d/init-transactions.sql:ro
    networks:
      - bank-network
    healthcheck:
      # Usa variables del contenedor ($$ -> $) para evitar fallos si el .env trunca valores con # o $
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL - Accounts Service (CQRS Write Side)
  # ---------------------------------------------------------------------------
  postgres-accounts:
    image: postgres:latest
    container_name: postgres-accounts
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_ACC_DB}
      POSTGRES_USER: ${POSTGRES_ACC_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ACC_PASSWORD}
    volumes:
      - pg-accounts-data:/var/lib/postgresql
      - ./init/init-accounts.sql:/docker-entrypoint-initdb.d/init-accounts.sql:ro
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MongoDB - History Read Model (CQRS Read Side)
  # BD inicial creada al primer arranque: mongodb-history (MONGO_INITDB_DATABASE)
  # El usuario root solo se crea si /data/db está vacío la primera vez.
  # Si Compass da "Authentication failed": borra volumen flashbank-mongo-data y
  # vuelve a levantar (ver comentarios en .env).
  # Puerto en el HOST: 27018 (evita choque con MongoDB instalado en macOS en :27017).
  # Desde otros contenedores sigue siendo mongodb:27017 en la red bank-network.
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-mongodb-history}
    volumes:
      - mongo-data:/data/db
      - ./init/init-mongo-seed.js:/docker-entrypoint-initdb.d/init-mongo-seed.js:ro
    networks:
      - bank-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 })" | grep -q 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # LocalStack - AWS SQS/SNS Emulator
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      LOCALSTACK_HOST: localstack
    volumes:
      - localstack-data:/var/lib/localstack
      - ./init/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues --region us-east-1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Inspección SQS: un contenedor por cola (misma API SQS en LocalStack).
  # Las colas siguen viviendo DENTRO de LocalStack; estos servicios solo
  # llaman a la API y escriben en stdout (ver: docker compose logs -f <nombre>).
  #
  # Perfil "sqs-peek": no se levantan por defecto (evita competir con .NET).
  #   docker compose --profile sqs-peek up -d
  #
  # Nombres de cola (p. ej. MassTransit): sobreescribe en .env si hace falta.
  # ---------------------------------------------------------------------------
  sqs-peek-transaction-created:
    profiles: ["sqs-peek"]
    # Tag "2" no existe en Docker Hub; usar latest o versión explícita (ej. 2.22.35)
    image: amazon/aws-cli:latest
    container_name: sqs-peek-transaction-created
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      ENDPOINT_URL: http://localstack:4566
      QUEUE_NAME: ${SQS_PEEK_QUEUE_CREATED:-transaction-created-queue}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[sqs-peek-transaction-created] cola=$$QUEUE_NAME endpoint=$$ENDPOINT_URL"
        while true; do
          Q=$$(aws sqs get-queue-url --queue-name "$$QUEUE_NAME" --endpoint-url "$$ENDPOINT_URL" --region us-east-1 --query QueueUrl --output text 2>/dev/null) || { echo "...esperando cola $$QUEUE_NAME"; sleep 5; continue; }
          OUT=$$(aws sqs receive-message --queue-url "$$Q" --endpoint-url "$$ENDPOINT_URL" --region us-east-1 --max-number-of-messages 10 --wait-time-seconds 10 --visibility-timeout 5 --attribute-names All --output json 2>/dev/null || echo "{}")
          if echo "$$OUT" | grep -q '"Messages"'; then
            echo "======== $$QUEUE_NAME $$(date -u +%Y-%m-%dT%H:%M:%SZ) ========"
            echo "$$OUT"
          fi
          sleep 2
        done
    networks:
      - bank-network

  sqs-peek-transaction-processed:
    profiles: ["sqs-peek"]
    image: amazon/aws-cli:latest
    container_name: sqs-peek-transaction-processed
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      ENDPOINT_URL: http://localstack:4566
      QUEUE_NAME: ${SQS_PEEK_QUEUE_PROCESSED:-transaction-processed-queue}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[sqs-peek-transaction-processed] cola=$$QUEUE_NAME endpoint=$$ENDPOINT_URL"
        while true; do
          Q=$$(aws sqs get-queue-url --queue-name "$$QUEUE_NAME" --endpoint-url "$$ENDPOINT_URL" --region us-east-1 --query QueueUrl --output text 2>/dev/null) || { echo "...esperando cola $$QUEUE_NAME"; sleep 5; continue; }
          OUT=$$(aws sqs receive-message --queue-url "$$Q" --endpoint-url "$$ENDPOINT_URL" --region us-east-1 --max-number-of-messages 10 --wait-time-seconds 10 --visibility-timeout 5 --attribute-names All --output json 2>/dev/null || echo "{}")
          if echo "$$OUT" | grep -q '"Messages"'; then
            echo "======== $$QUEUE_NAME $$(date -u +%Y-%m-%dT%H:%M:%SZ) ========"
            echo "$$OUT"
          fi
          sleep 2
        done
    networks:
      - bank-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  pg-transactions-data:
    name: flashbank-pg-transactions-data
  pg-accounts-data:
    name: flashbank-pg-accounts-data
  mongo-data:
    name: flashbank-mongo-data
  localstack-data:
    name: flashbank-localstack-data

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  bank-network:
    name: bank-network
    driver: bridge
